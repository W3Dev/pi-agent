name: pi comment agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: pi-comment-agent-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run pi agent
        uses: W3Dev/pi-agent@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pi-model-json: ${{ secrets.PI_MODEL_JSON }}
          pi-allow-push: ${{ vars.PI_ALLOW_PUSH || 'false' }}
          pi-cli-version: '0.58.3'
          pi-model: 'zai/glm-5'
